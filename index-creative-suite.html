<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriel FX - Creative Suite</title>
    
    <!-- Creative Suite Layout -->
    <link rel="stylesheet" href="creative-suite-layout.css">
    
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="creative-suite-container">
        
        <!-- Canvas Background (Three.js Visualizer) -->
        <div class="canvas-background">
            <div id="graph-container"></div>
        </div>

        <!-- TOP-RIGHT CORNER - Status Card -->
        <div class="status-card">
            <div class="status-header">
                <div class="downloads-badge">
                    <span>📊</span>
                    <span id="downloads-text">3 Free Downloads</span>
                </div>
            </div>
            
            <!-- Auth Buttons -->
            <div id="auth-section" class="auth-buttons">
                <button type="button" id="login-btn" class="auth-btn">Login</button>
                <button type="button" id="register-btn" class="auth-btn primary">Sign Up</button>
            </div>
            
            <!-- User Info (Hidden by default) -->
            <div id="user-section" class="hidden" style="display: flex; flex-direction: column; gap: 8px;">
                <div style="font-size: 12px; color: rgba(255, 255, 255, 0.7);" id="user-email-display"></div>
                <div style="display: flex; gap: 8px;">
                    <button type="button" id="dashboard-btn" class="auth-btn" style="flex: 1;">Dashboard</button>
                    <button type="button" id="logout-btn" class="auth-btn" style="flex: 1;">Logout</button>
                </div>
            </div>
        </div>

        <!-- LEFT SIDEBAR - Fixed 280px -->
        <aside class="left-sidebar">
            
            <!-- Shape Selector -->
            <div>
                <div class="section-label">Shapes</div>
                <div class="shape-grid">
                    <button type="button" class="shape-btn" data-shape="twistedBox" title="Twisted Box">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M3 9h18M9 21V9"/>
                        </svg>
                    </button>
                    <button type="button" class="shape-btn active" data-shape="spire" title="Spire">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 2 22 22 22"/>
                        </svg>
                    </button>
                    <button type="button" class="shape-btn" data-shape="donut" title="Donut">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <circle cx="12" cy="12" r="4"/>
                        </svg>
                    </button>
                    <button type="button" class="shape-btn" data-shape="helix" title="Helix">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8"/>
                            <path d="M12 4v16"/>
                        </svg>
                    </button>
                    <button type="button" class="shape-btn" data-shape="sphere" title="Sphere">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                    </button>
                    <button type="button" class="shape-btn" data-shape="cube" title="Cube">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                            <line x1="12" y1="22.08" x2="12" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Visualization Controls -->
            <div>
                <div class="section-label">Visualization</div>
                
                <div class="control-item">
                    <label class="control-label">
                        <span>Glow Color</span>
                        <span class="control-value" id="glow-color-value">#00F5FF</span>
                    </label>
                    <input type="color" id="glowColor" value="#00F5FF">
                </div>
                
                <div class="control-item">
                    <label class="control-label">
                        <span>Pulse Intensity</span>
                        <span class="control-value" id="pulse-value">1.5</span>
                    </label>
                    <input type="range" id="pulse" min="0" max="3" step="0.1" value="1.5">
                </div>
            </div>

            <!-- Action Group - Stacked Vertically -->
            <div class="action-group">
                <button type="button" id="randomize-button" class="action-btn primary">
                    <span>🎲</span>
                    <span>Randomize</span>
                </button>
                
                <label for="audioUpload" class="action-btn" style="cursor: pointer; margin: 0;">
                    <span>📂</span>
                    <span>Upload Audio</span>
                </label>
                <input type="file" id="audioUpload" accept="audio/*" class="hidden">
                
                <button type="button" id="upgrade-button" class="action-btn hidden">
                    <span>✨</span>
                    <span>Upgrade Plan</span>
                </button>

                <button type="button" id="buy-credits-button" class="action-btn hidden">
                    <span>💎</span>
                    <span>Buy Credits</span>
                </button>
            </div>

            <!-- Monetization - Bottom of Sidebar -->
            <a href="https://www.buymeacoffee.com/gastondana627" target="_blank" rel="noopener" 
               id="bmac-button" class="monetization-btn">
                <span>☕</span>
                <span>Buy More</span>
            </a>
        </aside>

        <!-- BOTTOM CENTER - Transport Bar -->
        <div class="transport-bar">
            <button type="button" id="pause-button" class="transport-btn">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="4" width="4" height="16"/>
                    <rect x="14" y="4" width="4" height="16"/>
                </svg>
                <span>Pause</span>
            </button>
            
            <button type="button" id="download-button" class="transport-btn primary">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <span>Download</span>
            </button>
        </div>
    </div>

    <!-- MODALS -->
    
    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #00f5ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome Back</h2>
            <p style="font-size: 14px; color: rgba(255, 255, 255, 0.6); margin-bottom: 24px;">Sign in to your account</p>
            
            <form id="login-form" style="display: flex; flex-direction: column; gap: 16px;">
                <div class="control-item">
                    <label class="control-label">Email</label>
                    <input type="email" id="login-email" name="email" required 
                           style="width: 100%; height: 44px; padding: 0 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; font-family: inherit; font-size: 14px;">
                </div>
                <div class="control-item">
                    <label class="control-label">Password</label>
                    <input type="password" id="login-password" name="password" required
                           style="width: 100%; height: 44px; padding: 0 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; font-family: inherit; font-size: 14px;">
                </div>
                <button type="submit" class="action-btn primary" style="width: 100%;">Sign In</button>
                <div style="text-align: center; font-size: 13px; color: rgba(255, 255, 255, 0.6);">
                    Don't have an account? <a href="#" id="show-register-link" style="color: #00f5ff; text-decoration: none;">Sign up</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #00f5ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Create Account</h2>
            <p style="font-size: 14px; color: rgba(255, 255, 255, 0.6); margin-bottom: 24px;">Join Oriel FX</p>
            
            <form id="register-form" style="display: flex; flex-direction: column; gap: 16px;">
                <div class="control-item">
                    <label class="control-label">Email</label>
                    <input type="email" id="register-email" name="email" required
                           style="width: 100%; height: 44px; padding: 0 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; font-family: inherit; font-size: 14px;">
                </div>
                <div class="control-item">
                    <label class="control-label">Password</label>
                    <input type="password" id="register-password" name="password" required
                           style="width: 100%; height: 44px; padding: 0 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; font-family: inherit; font-size: 14px;">
                </div>
                <div class="control-item">
                    <label class="control-label">Confirm Password</label>
                    <input type="password" id="register-confirm-password" name="confirmPassword" required
                           style="width: 100%; height: 44px; padding: 0 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; font-family: inherit; font-size: 14px;">
                </div>
                <button type="submit" class="action-btn primary" style="width: 100%;">Create Account</button>
                <div style="text-align: center; font-size: 13px; color: rgba(255, 255, 255, 0.6);">
                    Already have an account? <a href="#" id="show-login-link" style="color: #00f5ff; text-decoration: none;">Sign in</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Download Modal -->
    <div id="progress-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="choice-view">
                <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 16px;">Choose Format</h2>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button type="button" id="download-gif-button" class="action-btn primary" style="width: 100%;">Download GIF (30s)</button>
                    <button type="button" id="download-mp3-button" class="action-btn" style="width: 100%;">Download MP3</button>
                </div>
            </div>
            <div id="progress-view" class="hidden">
                <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 16px;">Creating...</h2>
                <div style="width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; margin-bottom: 12px;">
                    <div id="progress-bar-inner" style="height: 100%; width: 0%; background: linear-gradient(90deg, #00f5ff, #ff00ff); transition: width 0.3s ease;"></div>
                </div>
                <p id="modal-status" style="font-size: 14px; color: rgba(255, 255, 255, 0.6);">Recording...</p>
            </div>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="background-music" src="assets/music_fx_a_trap_beat_with_a_heavy_bass_butwith_techno-2.wav" loop></audio>

    <!-- External Libraries -->
    <script src="https://unpkg.com/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Controllers -->
    <script src="creative-suite-controller.js"></script>
    <script src="premium-ui-controller.js"></script>

    <!-- Application Scripts -->
    <script src="app-config.js"></script>
    <script src="api-client.js"></script>
    <script src="notification-manager.js"></script>
    <script src="auth-manager.js"></script>
    <script src="auth-ui.js"></script>
    <script src="usage-tracker.js"></script>
    <script src="payment-manager.js"></script>
    <script src="payment-ui.js"></script>
    <script src="payment-integration.js"></script>
    <script src="feature-manager.js"></script>
    <script src="download-modal.js"></script>
    <script src="purchase-modal.js"></script>
    <script src="saas-init.js"></script>
    
    <!-- Main Application -->
    <script src="script.js"></script>
    <script src="graph.js"></script>
</body>
</html>
