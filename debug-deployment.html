<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Vercel Deployment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #0a0a0a;
            color: #fff;
        }
        .test-item {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 5px;
        }
        .success { border-color: #0f0; }
        .error { border-color: #f00; }
    </style>
</head>
<body>
    <h1>🔍 Vercel Deployment Debug</h1>
    <p>Testing if files are accessible...</p>
    
    <div id="tests"></div>
    
    <script>
        const files = [
            'premium-ui-redesign.css',
            'creative-suite-layout.css',
            'vaporwave-glassmorphism-theme.css',
            'professional-creative-tool.css',
            'script.js',
            'app-config.js'
        ];
        
        const testsDiv = document.getElementById('tests');
        
        files.forEach(async (file) => {
            const div = document.createElement('div');
            div.className = 'test-item';
            
            try {
                const response = await fetch(file);
                if (response.ok) {
                    div.className += ' success';
                    div.innerHTML = `✅ ${file} - OK (${response.status})`;
                } else {
                    div.className += ' error';
                    div.innerHTML = `❌ ${file} - Error (${response.status})`;
                }
            } catch (error) {
                div.className += ' error';
                div.innerHTML = `❌ ${file} - Failed to fetch: ${error.message}`;
            }
            
            testsDiv.appendChild(div);
        });
        
        // Test current commit
        const commitDiv = document.createElement('div');
        commitDiv.className = 'test-item';
        commitDiv.innerHTML = `📝 Page loaded at: ${new Date().toISOString()}`;
        testsDiv.appendChild(commitDiv);
    </script>
</body>
</html>
